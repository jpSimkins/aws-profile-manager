name: Security Scans

# Note: Code scanning requires GitHub Advanced Security
# - Free for public repositories
# - Paid feature for private repositories
# This workflow will automatically work once the repository is made public

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write  # For uploading SARIF results
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Skip on private repos (requires GitHub Advanced Security)
    if: github.event.repository.visibility == 'public'
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.0.2
        with:
          go-version-file: ./go.mod
          cache: true
          cache-dependency-path: ./go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@afb54ba388a7dca6ecae48f608c4ff05ff4cc77a  # v3.25.15
        with:
          languages: go
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@afb54ba388a7dca6ecae48f608c4ff05ff4cc77a  # v3.25.15

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@afb54ba388a7dca6ecae48f608c4ff05ff4cc77a  # v3.25.15
        with:
          category: "/language:go"

  gosec:
    name: Gosec Security Scanner
    runs-on: ubuntu-latest
    # Skip on private repos (requires GitHub Advanced Security)
    if: github.event.repository.visibility == 'public'
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.0.2
        with:
          go-version-file: ./go.mod
          cache: true
          cache-dependency-path: ./go.sum

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec Security Scanner
        run: gosec -no-fail -fmt sarif -out gosec-results.sarif ./...

      - name: Upload Gosec Results to GitHub Security
        uses: github/codeql-action/upload-sarif@afb54ba388a7dca6ecae48f608c4ff05ff4cc77a  # v3.25.15
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  trivy:
    name: Trivy Vulnerability Scanner
    runs-on: ubuntu-latest
    # Skip on private repos (requires GitHub Advanced Security)
    if: github.event.repository.visibility == 'public'
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@afb54ba388a7dca6ecae48f608c4ff05ff4cc77a  # v3.25.15
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only run on pull requests from public repos
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Dependency Review
        uses: actions/dependency-review-action@5a2ce3f5b92ee19cbb1541a4984c76d921601d7c  # v4.3.4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
